<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ACE – nowe wydanie</title>
</head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6fb;padding:30px 0;">
    <tr>
      <td align="center">

        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 8px 25px rgba(0,0,0,0.06);">

          <!-- HEADER (bez obrazka) -->
          <tr>
            <td style="background:#0b1220;padding:22px 26px;">
              <div style="color:#ffffff;font-size:14px;letter-spacing:0.3px;opacity:.9;">
                Agri Commodity Experts
              </div>
              <div style="color:#ffffff;font-size:22px;font-weight:700;margin-top:6px;">
                Nowe wydanie
              </div>
            </td>
          </tr>

          <!-- CONTENT -->
          <tr>
            <td style="padding:28px 28px 10px 28px;">

              <div style="font-size:16px;color:#0b1220;font-weight:700;margin:0 0 10px 0;">
                Nowe Wydanie Agri Commodity Experts:
              </div>

              <div style="margin:0 0 18px 0;color:#333;font-size:14px;">
                Data: <strong>{{DATE}}</strong>
              </div>

              <div style="font-size:14px;color:#222;line-height:1.6;">
                {{CONTENT}}
              </div>

              <div style="margin-top:26px;text-align:center;">
                <a href="https://raporty.ace-group.pl/"
                   style="display:inline-block;background:#0b1220;color:#ffffff;
                          padding:14px 24px;text-decoration:none;border-radius:8px;
                          font-size:15px;font-weight:700;">
                  Otwórz panel
                </a>
              </div>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background:#f0f2f7;padding:14px;text-align:center;font-size:12px;color:#666;">
              ACE – Agri Commodity Experts • Automatyczne powiadomienie systemowe
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
